<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern AI Assistant</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --chat-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            background: var(--bg-gradient); 
            margin: 0; 
            padding: 0; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-container { 
            width: 440px; 
            max-width: 95%; 
            height: 600px;
            background: var(--chat-bg); 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .chat-header { 
            background: var(--primary); 
            background: linear-gradient(135deg, var(--primary) 0%, #0d9488 100%);
            color: white; 
            padding: 20px; 
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .avatar-main {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            border: 2px solid rgba(255,255,255,0.4);
        }

        .header-info {
            flex: 1;
        }

        .header-info h3 {
            margin: 0;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        .status-indicator {
            font-size: 12px;
            color: #2ed573;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 3px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #2ed573;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        .chat-box { 
            flex: 1;
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: #f8fafc; 
        }

        .msg-wrapper {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s ease forwards;
        }

        .msg-wrapper.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-wrapper.bot {
            align-self: flex-start;
        }

        .avatar-bubble {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .user .avatar-bubble { background: var(--primary-light); }
        .bot .avatar-bubble { background: #0d9488; }

        .message { 
            padding: 12px 18px; 
            border-radius: 18px; 
            font-size: 14.5px; 
            line-height: 1.5; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .user .message { 
            background: var(--primary-light); 
            color: white; 
            border-top-right-radius: 2px;
        }

        .bot .message { 
            background: white; 
            color: var(--text-dark); 
            border-top-left-radius: 2px;
            border: 1px solid #e2e8f0;
        }

        .input-area { 
            display: flex; 
            border-top: 1px solid #e2e8f0; 
            background: #ffffff; 
            padding: 10px 15px;
            align-items: center;
            gap: 10px;
        }

        .input-area input { 
            flex: 1; 
            padding: 12px 18px; 
            border: 1px solid #e2e8f0; 
            border-radius: 25px;
            outline: none; 
            font-size: 14px; 
            transition: all 0.2s;
            background: #f8fafc;
        }

        .input-area input:focus {
            border-color: var(--primary-light);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .input-area button { 
            width: 42px;
            height: 42px;
            background: var(--primary-light); 
            color: white; 
            border: none; 
            border-radius: 50%;
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        .input-area button:hover { 
            background: var(--primary); 
            transform: scale(1.05);
        }

        .input-area button active {
            transform: scale(0.95);
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar */
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar-main">🤖</div>
        <div class="header-info">
            <h3> Intelligent Agent</h3>
            <div class="status-indicator">
                <span class="status-dot"></span> Online | Intent Engine Active
            </div>
        </div>
    </div>
    
    <div class="chat-box" id="chatBox">
        <div class="msg-wrapper bot">
            <div class="avatar-bubble">AI</div>
            <div class="message">Hello! Welcome to our commercial platform. How can I assist you with our cloud solutions today?</div>
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const messageText = inputField.value.trim();
        if(!messageText) return;

        appendMessage(messageText, 'user', 'U');
        inputField.value = '';

        try {
            const response = await fetch('/get_response', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: messageText })
            });
            const data = await response.json();
            appendMessage(data.response, 'bot', 'AI');
        } catch (error) {
            appendMessage("Error reaching the automated intent system.", 'bot', 'AI');
        }
    }

    function appendMessage(text, direction, avatarTxt) {
        const chatBox = document.getElementById('chatBox');
        
        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${direction}`;
        
        const avatar = document.createElement('div');
        avatar.className = 'avatar-bubble';
        avatar.innerText = avatarTxt;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        msgDiv.innerText = text;
        
        wrapper.appendChild(avatar);
        wrapper.appendChild(msgDiv);
        chatBox.appendChild(wrapper);
        
        // Automated smooth view tracking scroll adjustment
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') sendMessage();
    }
</script>
</body>
</html>
